<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleeve — Profile</title>
<script src="js/supabase-lib.js"></script>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/auth.css">
<style>
.profile-layout {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem;
}
.profile-header-section {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.profile-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 1.6rem;
  font-weight: 400;
  flex-shrink: 0;
}
[data-theme="dark"] .profile-avatar {
  background: #fff;
  color: #000;
}
.profile-name-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.profile-info h1 {
  font-size: 1.3rem;
  font-weight: 400;
  letter-spacing: -0.01em;
}
.profile-bio {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
}
.profile-role-badge {
  display: inline-block;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.2rem 0.6rem;
  border: 1px solid var(--border);
  color: var(--text-faint);
}

/* Tabs */
.profile-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}
.profile-tab {
  padding: 0.8rem 1.5rem;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-faint);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.profile-tab:hover { color: var(--text); }
.profile-tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

/* Tab content */
.tab-content { display: none; }
.tab-content.active { display: block; }

.profile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 1rem;
}
.profile-cover-card {
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
  text-align: left;
}
.profile-cover-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
  background: var(--bg-alt);
}
.profile-cover-card .card-title {
  font-size: 0.72rem;
  margin-top: 0.4rem;
  text-transform: uppercase;
  color: var(--text);
}
.profile-cover-card .card-artist {
  font-size: 0.7rem;
  color: var(--text-muted);
}
.status-badge {
  display: inline-block;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.2rem 0.6rem;
  margin-top: 0.3rem;
  border-radius: 9999px;
  border: 1px solid;
}
.status-badge.pending { border-color: #f9a825; color: #f9a825; background: rgba(249,168,37,0.08); }
.status-badge.approved { border-color: #2e7d32; color: #2e7d32; background: rgba(46,125,50,0.08); }
.status-badge.rejected { border-color: #c62828; color: #c62828; background: rgba(198,40,40,0.08); }

/* Delete account */
.delete-account-btn {
  background: none;
  border: 1px solid #c00;
  color: #c00;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.8rem;
  padding: 0.6rem 1.2rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: background 0.2s, color 0.2s;
}
.delete-account-btn:hover { background: #c00; color: #fff; }

.empty-tab {
  border: 1px solid var(--border);
  background: none;
  color: var(--text);
  transition: background 0.2s, color 0.2s;
}
.friend-action-btn:hover { background: var(--text); color: var(--bg); }

.empty-tab {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-faint);
  font-size: 0.9rem;
}

.not-logged-in {
  text-align: center;
  padding: 4rem 1rem;
}
.not-logged-in p { color: var(--text-muted); margin-bottom: 1rem; }
</style>
</head>
<body>

<header class="site-header">
  <a href="index.html" style="font-size:0.85rem; color:var(--text-muted); text-decoration:none;">&larr; Back to Gallery</a>
  <div class="header-actions">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <span id="themeIcon">&#9789;</span>
    </button>
  </div>
</header>

<div class="profile-layout">
  <div id="loadingState" style="text-align:center; padding:4rem; color:var(--text-faint);">Loading...</div>
  <div id="notLoggedIn" class="not-logged-in" style="display:none;">
    <p>Sign in to view your profile.</p>
    <a href="index.html" style="color:var(--text-muted);">Return to gallery</a>
  </div>

  <div id="profileContent" style="display:none;">
    <div class="profile-header-section">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-info">
        <div class="profile-name-row">
          <h1 id="profileName"></h1>
          <span class="profile-role-badge" id="profileRole"></span>
        </div>
        <p class="profile-bio" id="profileBio"></p>
      </div>
    </div>

    <div class="profile-tabs">
      <button class="profile-tab active" data-tab="submissions">Submissions</button>
      <button class="profile-tab" data-tab="saved">Saved</button>
      <button class="profile-tab" data-tab="settings">Account</button>
    </div>

    <div class="tab-content active" id="tab-submissions">
      <div class="profile-grid" id="submissionsGrid"></div>
      <div class="empty-tab" id="submissionsEmpty" style="display:none;">No submissions yet.</div>
    </div>
    <div class="tab-content" id="tab-saved">
      <div class="profile-grid" id="savedGrid"></div>
      <div class="empty-tab" id="savedEmpty" style="display:none;">No saved covers yet.</div>
    </div>
    <div class="tab-content" id="tab-settings">
      <div style="max-width:400px;">
        <div style="border:1px solid var(--border); padding:1.5rem;">
          <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1rem;">Permanently delete your account and all associated data. This action cannot be undone.</p>
          <button class="delete-account-btn" id="deleteAccountBtn">Delete Account</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/profile.js"></script>

</body>
</html>
