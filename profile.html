<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleeve — Profile</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/auth.css">
<style>
.profile-layout {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem;
}
.profile-header-section {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.profile-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 1.6rem;
  font-weight: 400;
  flex-shrink: 0;
}
[data-theme="dark"] .profile-avatar {
  background: #fff;
  color: #000;
}
.profile-name-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.profile-info h1 {
  font-size: 1.3rem;
  font-weight: 400;
  letter-spacing: -0.01em;
}
.profile-bio {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 0.3rem;
}
.profile-role-badge {
  display: inline-block;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.2rem 0.6rem;
  border: 1px solid var(--border);
  color: var(--text-faint);
}

/* Tabs */
.profile-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}
.profile-tab {
  padding: 0.8rem 1.5rem;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-faint);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.profile-tab:hover { color: var(--text); }
.profile-tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

/* Tab content */
.tab-content { display: none; }
.tab-content.active { display: block; }

.profile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 1rem;
}
.profile-cover-card {
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
  text-align: left;
}
.profile-cover-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
  background: var(--bg-alt);
}
.profile-cover-card .card-title {
  font-size: 0.72rem;
  margin-top: 0.4rem;
  text-transform: uppercase;
  color: var(--text);
}
.profile-cover-card .card-artist {
  font-size: 0.7rem;
  color: var(--text-muted);
}
.status-badge {
  display: inline-block;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.2rem 0.6rem;
  margin-top: 0.3rem;
  border-radius: 9999px;
  border: 1px solid;
}
.status-badge.pending { border-color: #f9a825; color: #f9a825; background: rgba(249,168,37,0.08); }
.status-badge.approved { border-color: #2e7d32; color: #2e7d32; background: rgba(46,125,50,0.08); }
.status-badge.rejected { border-color: #c62828; color: #c62828; background: rgba(198,40,40,0.08); }

/* Delete account */
.delete-account-btn {
  background: none;
  border: 1px solid #c00;
  color: #c00;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.8rem;
  padding: 0.6rem 1.2rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: background 0.2s, color 0.2s;
}
.delete-account-btn:hover { background: #c00; color: #fff; }

.empty-tab {
  border: 1px solid var(--border);
  background: none;
  color: var(--text);
  transition: background 0.2s, color 0.2s;
}
.friend-action-btn:hover { background: var(--text); color: var(--bg); }

.empty-tab {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-faint);
  font-size: 0.9rem;
}

.not-logged-in {
  text-align: center;
  padding: 4rem 1rem;
}
.not-logged-in p { color: var(--text-muted); margin-bottom: 1rem; }
</style>
</head>
<body>

<header class="site-header">
  <a href="index.html" style="font-size:0.85rem; color:var(--text-muted); text-decoration:none;">&larr; Back to Gallery</a>
  <div class="header-actions">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <span id="themeIcon">&#9789;</span>
    </button>
  </div>
</header>

<div class="profile-layout">
  <div id="loadingState" style="text-align:center; padding:4rem; color:var(--text-faint);">Loading...</div>
  <div id="notLoggedIn" class="not-logged-in" style="display:none;">
    <p>Sign in to view your profile.</p>
    <a href="index.html" style="color:var(--text-muted);">Return to gallery</a>
  </div>

  <div id="profileContent" style="display:none;">
    <div class="profile-header-section">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-info">
        <div class="profile-name-row">
          <h1 id="profileName"></h1>
          <span class="profile-role-badge" id="profileRole"></span>
        </div>
        <p class="profile-bio" id="profileBio"></p>
      </div>
    </div>

    <div class="profile-tabs">
      <button class="profile-tab active" data-tab="submissions">Submissions</button>
      <button class="profile-tab" data-tab="saved">Saved</button>
      <button class="profile-tab" data-tab="settings">Account</button>
    </div>

    <div class="tab-content active" id="tab-submissions">
      <div class="profile-grid" id="submissionsGrid"></div>
      <div class="empty-tab" id="submissionsEmpty" style="display:none;">No submissions yet.</div>
    </div>
    <div class="tab-content" id="tab-saved">
      <div class="profile-grid" id="savedGrid"></div>
      <div class="empty-tab" id="savedEmpty" style="display:none;">No saved covers yet.</div>
    </div>
    <div class="tab-content" id="tab-settings">
      <div style="max-width:400px;">
        <div style="border:1px solid var(--border); padding:1.5rem;">
          <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1rem;">Permanently delete your account and all associated data. This action cannot be undone.</p>
          <button class="delete-account-btn" id="deleteAccountBtn">Delete Account</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { supabase, isSupabaseConfigured } from './js/supabase-config.js';
import { initAuth, onAuthChange, getUser, getProfile } from './js/auth.js';
import { getSavedCovers } from './js/social.js';
import { fetchSpotifyAlbum } from './js/utils.js';

// Theme
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
function setTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeIcon.innerHTML = dark ? '&#9788;' : '&#9789;';
  localStorage.setItem('sleeve-theme', dark ? 'dark' : 'light');
}
themeToggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') !== 'dark'));
if (localStorage.getItem('sleeve-theme') === 'dark') setTheme(true);

// Tabs
document.querySelectorAll('.profile-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

async function renderCoverCard(cover, container, showStatus = false) {
  const card = document.createElement('a');
  card.className = 'profile-cover-card';
  card.href = `index.html?cover=${cover.id}`;

  let artUrl = '';
  const spotifyId = cover.spotify_id || cover.spotifyId;
  if (spotifyId) {
    try { artUrl = (await fetchSpotifyAlbum(spotifyId)).thumbnailUrl; } catch(e) {}
  }

  const title = cover.title;
  const musician = cover.musician;
  const status = cover.status;

  card.innerHTML = `
    ${artUrl ? `<img src="${artUrl}" alt="${title}">` : `<div style="width:100%;aspect-ratio:1;background:var(--bg-alt)"></div>`}
    <div class="card-title">${title}</div>
    <div class="card-artist">${musician}</div>
    ${showStatus && status ? `<span class="status-badge ${status}">${status}</span>` : ''}
  `;
  container.appendChild(card);
}

async function loadSubmissions(userId) {
  const grid = document.getElementById('submissionsGrid');
  grid.innerHTML = '';

  let data = [];
  if (!isSupabaseConfigured()) {
    // Mock mode — load from localStorage
    try {
      data = JSON.parse(localStorage.getItem('sleeve-mock-covers') || '[]');
    } catch { data = []; }
  } else {
    const result = await supabase
      .from('covers')
      .select('*')
      .eq('submitted_by', userId)
      .order('created_at', { ascending: false });
    if (!result.error) data = result.data || [];
  }

  if (data.length === 0) {
    document.getElementById('submissionsEmpty').style.display = '';
    return;
  }
  document.getElementById('submissionsEmpty').style.display = 'none';
  for (const cover of data) await renderCoverCard(cover, grid, true);
}

async function loadSaved() {
  const grid = document.getElementById('savedGrid');
  grid.innerHTML = '';

  try {
    let savedCovers = [];
    if (!isSupabaseConfigured()) {
      // Mock mode — match saved IDs against static + mock covers
      const savedIds = JSON.parse(localStorage.getItem('sleeve-mock-saves') || '[]');
      if (savedIds.length) {
        const { STATIC_COVERS } = await import('./js/data-static.js');
        const mockCovers = JSON.parse(localStorage.getItem('sleeve-mock-covers') || '[]');
        const allCovers = [...STATIC_COVERS, ...mockCovers.filter(c => c.status === 'approved')];
        savedCovers = savedIds.map(id => allCovers.find(c => c.id === id)).filter(Boolean);
      }
    } else {
      savedCovers = await getSavedCovers();
    }

    if (!savedCovers.length) {
      document.getElementById('savedEmpty').style.display = '';
      return;
    }
    document.getElementById('savedEmpty').style.display = 'none';
    for (const cover of savedCovers) await renderCoverCard(cover, grid);
  } catch (e) {
    document.getElementById('savedEmpty').style.display = '';
  }
}

// Delete account
document.getElementById('deleteAccountBtn')?.addEventListener('click', () => {
  if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
    // In mock mode, just clear mock data and sign out
    localStorage.removeItem('sleeve-mock-user');
    localStorage.removeItem('sleeve-mock-saves');
    localStorage.removeItem('sleeve-mock-covers');
    window.location.href = 'index.html';
  }
});

// Init
await initAuth();

onAuthChange(async (user, profile) => {
  document.getElementById('loadingState').style.display = 'none';

  if (!user) {
    document.getElementById('notLoggedIn').style.display = '';
    document.getElementById('profileContent').style.display = 'none';
    return;
  }

  document.getElementById('notLoggedIn').style.display = 'none';
  document.getElementById('profileContent').style.display = '';

  // Fill profile header
  const name = profile?.display_name || 'User';
  document.getElementById('profileAvatar').textContent = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  document.getElementById('profileName').textContent = name;
  document.getElementById('profileBio').textContent = profile?.bio || '';
  document.getElementById('profileRole').textContent = profile?.role || 'user';

  // Load tab data
  await Promise.all([
    loadSubmissions(user.id),
    loadSaved()
  ]);
});
</script>

</body>
</html>
